version: "3"
networks:
  expense:
volumes:
  mysql:
services:
  mysql:
    image: kdprasad028/mysql_july:v1
    container_name: mysql
    volumes:
    - mysql:/var/lib/mysql
  
  backend:
    image: kdprasad028/backend_july:v1
    container_name: backend
    coomand: sh -c ["sleep 10 && node /opt/server/index.js"]
    depends_on:
      - mysql
    
  frontend:
    image: kdprasad028/frontend_july:v1
    container_name: frontend
    depends_on:
      - backend
    ports:
      - 80:80 